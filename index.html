<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Hiragana Board Demo</title>
    <script src="dict.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="header-bar">
        <div class="header-title">Moji Board</div>
        <button
          class="icon-button"
          type="button"
          data-open-settings
          aria-haspopup="dialog"
          aria-controls="settings-modal"
          aria-label="Open settings"
        >
          Settings
        </button>
      </header>
      <div class="topbar">
        <div class="total-score">
          <span class="score-label">Total</span>
          <strong data-total-score>0</strong>
        </div>
      </div>
      <div class="layout">
        <aside class="sidebar">
          <section class="score-panel" aria-label="Score breakdown">
            <div class="score-row score-turn">
              <span class="score-label">Turn</span>
              <strong data-turn-score>0</strong>
            </div>
            <div class="score-row">
              <span class="score-label">Base</span>
              <strong data-turn-base>0</strong>
            </div>
            <div class="score-formula">sum(10 x 2^(L-1))</div>
            <div class="score-row">
              <span class="score-label">W</span>
              <strong data-turn-multiplier>0</strong>
            </div>
            <div class="score-formula">words made</div>
          </section>
          <aside class="tray" data-tray aria-label="Hiragana tiles"></aside>
        </aside>
        <section class="main">
          <section
            class="board"
            data-board
            role="grid"
            aria-label="Word building board"
          ></section>
          <p class="status" data-status>Loading dictionary...</p>
          <pre class="debug" data-debug aria-live="polite"></pre>
        </section>
      </div>
    </main>
    <div class="modal-backdrop" data-settings-backdrop hidden></div>
    <section
      class="settings-modal"
      id="settings-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="settings-title"
      data-settings-modal
      hidden
    >
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button
          class="icon-button"
          type="button"
          data-close-settings
          aria-label="Close settings"
        >
          Close
        </button>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-title">Dark Mode</div>
          <div class="setting-copy">Switch between light and dark themes.</div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-theme-toggle />
          <span class="toggle-track"></span>
        </label>
      </div>
    </section>
  </body>
</html>
